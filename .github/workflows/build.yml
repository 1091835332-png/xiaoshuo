name: Build EXE

on:
  push:
    branches: [master]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install flask openai pywebview beautifulsoup4 python-dotenv pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller --onedir --name NovelScope --add-data "src\templates;src\templates" --add-data "src\static;src\static" --hidden-import webview.platforms.winforms --hidden-import flask --noconsole --clean --distpath dist --workpath build-tmp src\desktop.py

      - name: Package to zip
        run: |
          powershell Compress-Archive -Path dist\NovelScope\* -DestinationPath NovelScope.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NovelScope
          path: NovelScope.zip

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: NovelScope.zip
