<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NovelScope · 小说分析</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<!-- 顶部导航 -->
<nav class="topbar">
  <div class="topbar-inner">
    <span class="logo">📖 NovelScope</span>
    <div class="topbar-actions">
      <button class="topbar-btn" id="btnSettings" title="API Key">⚙️ 设置</button>
    </div>
  </div>
</nav>

<!-- API Key 面板 -->
<div class="key-panel" id="settingsPanel" style="display:none">
  <div class="key-panel-card">
    <h3>🔑 DeepSeek API Key</h3>
    <div class="key-row">
      <input type="password" id="apiKeyInput" placeholder="sk-...">
      <button class="icon-btn" id="btnToggleKey">👁</button>
      <button class="btn-accent" id="btnSaveKey">保存</button>
    </div>
    <span class="key-badge" id="keyStatus"></span>
  </div>
</div>

<!-- 主区域 -->
<main class="main-grid">
  <!-- 左栏：上传 + 设置 -->
  <aside class="sidebar">
    <!-- 拖拽区 -->
    <div class="drop-card" id="drop-zone">
      <div class="drop-visual">
        <div class="drop-ring">
          <span class="drop-icon-lg">📂</span>
        </div>
      </div>
      <p class="drop-title">拖拽小说文件到此处</p>
      <p class="drop-hint">或点击下方按钮选择文件</p>
      <button class="btn-outline" onclick="document.getElementById('file-input').click()">选择文件</button>
      <input type="file" id="file-input" accept=".txt,.epub,.docx" hidden>
    </div>

    <!-- 文件信息 -->
    <div id="file-info" class="file-tag" style="display:none">
      <span class="file-tag-icon">📄</span>
      <span id="file-name"></span>
      <span class="file-tag-meta" id="file-meta"></span>
      <button class="file-tag-close" onclick="resetFile()">×</button>
    </div>

    <!-- 维度选择 -->
    <div id="dimensions-panel" style="display:none">
      <h3 class="section-label">分析维度</h3>
      <div class="dim-chips">
        <label class="dim-chip"><input type="checkbox" value="worldview" checked><span>🌍 世界观</span></label>
        <label class="dim-chip"><input type="checkbox" value="characters" checked><span>👤 人物转变</span></label>
        <label class="dim-chip"><input type="checkbox" value="plot" checked><span>📈 关键情节</span></label>
        <label class="dim-chip"><input type="checkbox" value="themes" checked><span>💡 主题思想</span></label>
      </div>
      <button class="btn-primary" id="analyze-btn" onclick="startAnalyze()">⚡ 开始分析</button>
    </div>
  </aside>

  <!-- 右栏：结果 -->
  <section class="result-panel" id="result-section" style="display:none">
    <div class="progress-section" id="progress-area" style="display:none">
      <div class="progress-header">
        <span class="progress-label" id="progressLabel">正在准备…</span>
        <span class="progress-pct" id="progressPct">0%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progressBar"></div>
      </div>
    </div>
    <div class="result-cards" id="resultContent"></div>
  </section>
</main>

<script src="/static/app.js"></script>
</body>
</html>
